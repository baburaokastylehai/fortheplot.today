<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fortheplot.today</title>
<meta name="description" content="Do it for the plot.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@200;300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#000;font-family:"Outfit",system-ui,sans-serif;color:#fff}

/* ===== FULLSCREEN VIDEO ===== */
.video-bg{
  position:fixed;inset:0;z-index:0;
  overflow:hidden;
}
.video-bg video{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

/* ===== OVERLAYS ===== */
/* Gradient overlay — darkens bottom for text readability */
.overlay{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.02) 30%, rgba(0,0,0,0.15) 65%, rgba(0,0,0,0.55) 100%);
}

/* Subtle vignette */
.vignette{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.25) 100%);
}

/* ===== TOP MARK ===== */
.top{
  position:fixed;
  top:2rem;left:2.5rem;
  z-index:10;
  opacity:0;animation:fadeIn .8s .3s ease forwards;
}

.top-name{
  font-family:"Instrument Serif",Georgia,serif;
  font-style:italic;
  font-size:1.6rem;
  color:rgba(255,255,255,0.9);
  letter-spacing:-0.01em;
  text-shadow:0 2px 20px rgba(0,0,0,0.3);
}
.top-name .dot{color:#E0A840;text-shadow:0 0 20px rgba(224,168,64,0.3)}

/* ===== BOTTOM CONTENT ===== */
.bottom{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:10;
  padding:0 2.5rem 2.2rem;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:2rem;
}

/* Left — tagline */
.tagline{
  max-width:340px;
  opacity:0;animation:fadeUp .8s .6s ease forwards;
}
.tagline h1{
  font-family:"Instrument Serif",Georgia,serif;
  font-style:italic;font-weight:400;
  font-size:clamp(2rem,4vw,2.8rem);
  line-height:1.1;
  color:rgba(255,255,255,0.92);
  text-shadow:0 2px 30px rgba(0,0,0,0.3);
  margin-bottom:0.5rem;
}
.tagline p{
  font-size:0.78rem;font-weight:300;
  color:rgba(255,255,255,0.45);
  text-shadow:0 1px 10px rgba(0,0,0,0.3);
}

/* Right — glass link panel */
.glass{
  display:flex;
  gap:0.5rem;
  align-items:flex-end;
  flex-wrap:wrap;
  justify-content:flex-end;
  opacity:0;animation:fadeUp .8s .8s ease forwards;
}

.lk{
  display:flex;
  align-items:center;
  gap:0.55rem;
  padding:0.65rem 1.1rem;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:50px;
  text-decoration:none;
  color:rgba(255,255,255,0.8);
  font-size:0.72rem;
  font-weight:400;
  letter-spacing:0.02em;
  transition:all .35s cubic-bezier(.25,.46,.45,.94);
  white-space:nowrap;
}

.lk:hover{
  background:rgba(255,255,255,0.18);
  border-color:rgba(255,255,255,0.22);
  color:#fff;
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,0.15);
}

.lk svg{
  width:14px;height:14px;
  opacity:0.6;
  transition:opacity .3s;
}
.lk:hover svg{opacity:0.9}

/* Featured link */
.lk.feat{
  background:rgba(255,255,255,0.14);
  border-color:rgba(224,168,64,0.15);
}
.lk.feat:hover{
  border-color:rgba(224,168,64,0.3);
  box-shadow:0 8px 32px rgba(224,168,64,0.08);
}

/* Small label under featured */
.lk .tag{
  font-family:"JetBrains Mono",monospace;
  font-size:0.4rem;
  letter-spacing:0.1em;
  color:rgba(255,255,255,0.3);
  margin-left:-0.1rem;
}

/* Footer */
.foot{
  position:fixed;
  bottom:0.6rem;
  left:50%;transform:translateX(-50%);
  z-index:10;
  font-family:"JetBrains Mono",monospace;
  font-size:0.38rem;
  letter-spacing:0.25em;
  color:rgba(255,255,255,0.12);
  opacity:0;animation:fadeIn .6s 1.4s ease forwards;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .bottom{
    flex-direction:column;
    align-items:flex-start;
    padding:0 1.5rem 4rem;
    gap:1.2rem;
  }
  .glass{
    justify-content:flex-start;
    gap:0.4rem;
  }
  .lk{
    padding:0.55rem 0.9rem;
    font-size:0.65rem;
  }
  .tagline h1{font-size:clamp(1.6rem,6vw,2.2rem)}
  .top{top:1.5rem;left:1.5rem}
  .top-name{font-size:1.3rem}
}

@media(max-width:480px){
  .glass{flex-wrap:wrap}
  .lk{font-size:0.6rem;padding:0.5rem 0.8rem}
}
</style>
</head>

  </div>

</div>
